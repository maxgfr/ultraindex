name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24]
    name: build-test (node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build is reproducible (committed bundle + grammar wasms up to date)
        run: pnpm run check:build # tsup && copy-bundle && git diff --exit-code over both bundles + both grammar dirs

      - name: Test
        run: pnpm test

      - name: Smoke-run the committed bundle (offline, fixture repo)
        run: pnpm run demo # build the index for a fixture repo, then check it

      - name: Assert the index was produced
        run: test -f /tmp/ultraindex-demo/INDEX.md && test -f /tmp/ultraindex-demo/graph.json

  # The shipped scripts/ultraindex.mjs is a dependency-free bundle that declares
  # engines.node ">=18", but the dev toolchain (vitest 4) needs Node >=20.19 — so
  # build-test above can't prove the floor. This job runs ONLY the committed
  # bundle on Node 18, with no install, to guarantee the published ">=18" promise
  # actually holds (a Node 20+ API sneaking into src/ would build green on Node 24
  # yet break for real users on 18; this catches that).
  runtime-node-floor:
    runs-on: ubuntu-latest
    name: runtime (Node 18 floor, zero-dep bundle)
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Build + check an index on Node 18
        run: |
          node scripts/ultraindex.mjs build --repo tests/fixtures/mini-repo --out "$RUNNER_TEMP/u18"
          test -f "$RUNNER_TEMP/u18/INDEX.md"
          test -f "$RUNNER_TEMP/u18/graph.json"
          node scripts/ultraindex.mjs check --repo tests/fixtures/mini-repo --out "$RUNNER_TEMP/u18"

      - name: Find / dossier / ask run on Node 18
        run: |
          node scripts/ultraindex.mjs find "retry backoff" --out "$RUNNER_TEMP/u18"
          node scripts/ultraindex.mjs dossier src --repo tests/fixtures/mini-repo --out "$RUNNER_TEMP/u18" | grep -q "export class HttpClient"
          node scripts/ultraindex.mjs ask "how does backoff work" --repo tests/fixtures/mini-repo --out "$RUNNER_TEMP/u18" | grep -q "export function backoff"

      - name: Grounding gate blocks an uncited answer (exit 1)
        run: |
          echo "no citations here" > "$RUNNER_TEMP/u18/ANSWER.md"
          if node scripts/ultraindex.mjs check --answer "$RUNNER_TEMP/u18/ANSWER.md" --out "$RUNNER_TEMP/u18"; then
            echo "expected non-zero exit for an ungrounded answer"; exit 1
          fi
          printf 'backoff is exponential [src/util.ts:2]\n' > "$RUNNER_TEMP/u18/ANSWER.md"
          node scripts/ultraindex.mjs check --answer "$RUNNER_TEMP/u18/ANSWER.md" --out "$RUNNER_TEMP/u18"

      # The full high-assurance chain, on the committed bundle: verify emits the
      # worklist, verdicts are applied, check --semantic passes — then a DOCTORED
      # VERIFY.json (summary says ok while verdicts[] holds a refuted row) must
      # exit non-zero, proving the gate re-reduces from the raw verdicts and
      # never trusts the persisted summary.
      - name: Semantic gate end-to-end (verify → apply → check --semantic + doctored summary fails)
        run: |
          ANS="$RUNNER_TEMP/u18/ANSWER.md"
          node scripts/ultraindex.mjs verify --answer "$ANS" --repo tests/fixtures/mini-repo --out "$RUNNER_TEMP/u18"
          node -e '
            const fs = require("fs"), dir = process.argv[1];
            const todo = JSON.parse(fs.readFileSync(dir + "/VERIFY.todo.json", "utf8"));
            if (!todo.pairs.length) { console.error("expected at least one claim pair"); process.exit(1); }
            const pairs = todo.pairs.map((x) => ({ ...x, verdict: "supported", note: "excerpt matches" }));
            fs.writeFileSync(dir + "/verdicts.json", JSON.stringify({ pairs }));
          ' "$RUNNER_TEMP/u18"
          node scripts/ultraindex.mjs verify --apply "$RUNNER_TEMP/u18/verdicts.json" --answer "$ANS"
          node scripts/ultraindex.mjs check --answer "$ANS" --semantic --repo tests/fixtures/mini-repo --out "$RUNNER_TEMP/u18"
          node -e '
            const fs = require("fs"), p = process.argv[1] + "/VERIFY.json";
            const v = JSON.parse(fs.readFileSync(p, "utf8"));
            v.verdicts[0].verdict = "refuted";
            v.ok = true; v.failures = []; v.refuted = 0;
            fs.writeFileSync(p, JSON.stringify(v, null, 2));
          ' "$RUNNER_TEMP/u18"
          if node scripts/ultraindex.mjs check --answer "$ANS" --semantic --repo tests/fixtures/mini-repo --out "$RUNNER_TEMP/u18"; then
            echo "expected non-zero exit for a doctored VERIFY.json summary"; exit 1
          fi
